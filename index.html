<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOMIGE — ノミゲ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/NOMIGE/assets/index-rtMecn4C.js"></script>
  <link rel="stylesheet" crossorigin href="/NOMIGE/assets/index-DBBs5wJl.css">
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="title-logo">NOMIGE</div>
  <div class="title-sub">カードゲーム・コレクション</div>
  <div class="menu-card">
    <button class="btn btn-primary" onclick="selectGame('yaniv')">🃏 ヤニブ (Yaniv)</button>
    <button class="btn btn-secondary" onclick="selectGame('dobon')">💥 ドボン (Dobon)</button>
    <button class="btn btn-hybrid" onclick="selectGame('hybrid')">🃏💥 ヤニブドボン (Hybrid)</button>
  </div>
</div>

<!-- MODE SELECTION SCREEN (AI/LOCAL) -->
<div id="mode-selection-screen" class="screen">
  <div class="title-logo">NOMIGE</div>
  <div class="title-sub" id="selected-game-label">🃏 ヤニブ (YANIV)</div>
  <div class="menu-card">
    <button class="btn btn-primary" onclick="showSetup('ai')">🤖 AI対戦</button>
    <button class="btn btn-secondary" onclick="showSetup('local')">👥 ローカル対人</button>
    <button class="btn btn-danger" onclick="showScreen('title-screen')">↪️ 戻る</button>
  </div>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen">
  <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);letter-spacing:0.08em;" id="setup-heading">ゲーム設定</div>
  <div class="setup-card" id="setup-form">
    <div class="setup-title" id="setup-mode-label">AI対戦</div>

    <div id="player-count-section">
      <div class="setup-label">プレイヤー数（あなた + AI）</div>
      <div class="option-group" id="player-count-opts">
        <button class="option-btn" onclick="selectOpt(this,'players','2')">2人</button>
        <button class="option-btn selected" onclick="selectOpt(this,'players','3')">3人</button>
        <button class="option-btn" onclick="selectOpt(this,'players','4')">4人</button>
        <button class="option-btn" onclick="selectOpt(this,'players','5')">5人</button>
      </div>
    </div>

    <div id="local-count-section" style="display:none">
      <div class="setup-label">プレイヤー数</div>
      <div class="option-group" id="local-count-opts">
        <button class="option-btn" onclick="selectOpt(this,'local_players','2')">2人</button>
        <button class="option-btn selected" onclick="selectOpt(this,'local_players','3')">3人</button>
        <button class="option-btn" onclick="selectOpt(this,'local_players','4')">4人</button>
        <button class="option-btn" onclick="selectOpt(this,'local_players','5')">5人</button>
      </div>
    </div>

    <div id="setup-init-cards-section">
      <div class="setup-label">初期手札枚数</div>
      <div class="option-group">
        <button class="option-btn selected" onclick="selectOpt(this,'init_cards','5')">5枚（通常）</button>
        <button class="option-btn" onclick="selectOpt(this,'init_cards','3')">3枚</button>
      </div>
    </div>

    <div class="setup-label">プレイヤー名</div>
    <div class="player-name-input" id="name-inputs"></div>

    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" style="flex:1" onclick="startGame()">ゲーム開始</button>
      <button class="btn btn-secondary" onclick="showRules()">❔ ルール</button>
      <button class="btn btn-secondary" onclick="showScreen('title-screen')">戻る</button>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="header-title">NOMIGE</div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="phase-indicator">
        <div class="phase-dot active" id="phase-dot"></div>
        <span id="phase-label">カードを交換</span>
      </div>
      <div class="round-info" id="round-info">ラウンド 1</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="btn-rule" onclick="showRules()" title="ルールを表示">?</button>
      <button class="btn btn-danger" style="padding:6px 12px;font-size:12px;" onclick="confirmQuit()">終了</button>
    </div>
  </div>

  <div class="score-panel" id="score-panel"></div>

  <div class="table-area">
    <div class="opponents-row" id="opponents-row"></div>

    <div class="center-table">
      <div class="deck-area">
        <div class="deck-label">山札</div>
        <div class="deck-pile" id="deck-pile" onclick="selectDeck()"></div>
        <div class="deck-count" id="deck-count">0枚</div>
      </div>
      <div class="discard-area">
        <div class="deck-label">捨て札</div>
        <div class="discard-cards" id="discard-area"></div>
      </div>
    </div>

    <div class="player-area" style="position:relative;">
      <div class="local-indicator" id="local-indicator"></div>
      <div class="player-label" id="player-label">あなたの手札</div>
      <div class="hand" id="player-hand"></div>
      <div class="hand-cover" id="hand-cover" onclick="revealHand()" style="display:none;">
        タップして手札を表示
      </div>
    </div>

    <div class="action-bar" id="action-bar">
      <button class="btn-action btn-yaniv" id="btn-yaniv" onclick="declareYaniv()" disabled>YANIV</button>
      <button class="btn-action btn-discard" id="btn-exchange" onclick="confirmExchange()" disabled>交換する</button>
    </div>

    <div class="status-bar" id="status-bar">カードを選択して捨ててください</div>
    <div class="action-log" id="action-log"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content">
    <div class="modal-title" id="modal-title">NOMIGE</div>
    <div class="modal-sub" id="modal-sub"></div>
    <table class="result-table" id="result-table"></table>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FEEDBACK BUTTON -->
<a class="feedback-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSfju9azd40MlXHBTbmJIWjTkwLpGEs0pt4rZLD-et5BQ4o8SA/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" title="ご意見箱">
  <span class="feedback-icon">✉</span>
  <span class="feedback-label">ご意見箱</span>
</a>

</body>
</html>
